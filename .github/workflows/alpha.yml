name: MTC Logic Scanner
on:
  schedule:
    # Runs every 15 minutes (Matches your 15m entry logic)
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows you to trigger it manually for testing

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy twelvedata python-telegram-bot mplfinance

      - name: Run MTC Scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
        # Updated to match your actual filename
        run: python your_script_name.py
