name: Mindful Forex Bot Scanner

on:
  schedule:
    # This triggers every 15 minutes (:00, :15, :30, :45)
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows you to force-run it for testing

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas numpy twelvedata python-telegram-bot

      - name: Run MTC Strategy
        env:
          # These MUST match the names in your GitHub Secrets
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python your_script_name.py # Change to your actual file name
