name: MTC Logic Scanner

on:
  schedule:
    # Runs every 15 minutes to match your 15m candle logic
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows you to trigger it manually from the "Actions" tab

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Use 3.12 to support the latest pandas_ta and numba versions
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy twelvedata python-telegram-bot mplfinance pandas_ta python-dotenv

      - name: Run MTC Scan
        env:
          # Ensure these match your GitHub Repo > Settings > Secrets
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
        # CRITICAL: If your python file is named 'bot.py', change the name below.
        run: python your_script_name.py
