name: Mindful Alpha Trading Bot

on:
  schedule:
    # This triggers the bot every 15 minutes, 24/7
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Installing pandas and technical analysis tools directly
          pip install pandas
          pip install git+https://github.com/twopirllc/pandas-ta.git@development
          pip install -r requirements.txt

      - name: Run Trading Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
        run: python main.py
