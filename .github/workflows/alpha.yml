name: MTC Logic Scanner

on:
  schedule:
    # Runs at the start of every hour (UTC)
    - cron: '0 * * * *'
  workflow_dispatch: # Allows you to manually trigger it from GitHub

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy twelvedata python-telegram-bot pandas_ta python-dotenv

      - name: Run MTC Scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
          PIP_FLOOR: 15.0  # <--- Added this to control the minimum signal size
        run: python bot.py
