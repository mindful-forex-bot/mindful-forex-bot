name: MTC Logic Scanner

on:
  schedule:
    # Runs every 15 minutes to match your 15m candle logic
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows you to trigger it manually from the "Actions" tab

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Added pandas_ta for the new Trend/ADX filters
          pip install pandas numpy twelvedata python-telegram-bot mplfinance pandas_ta

      - name: Run MTC Scan
        env:
          # Ensure these names match the "Secrets" you saved in GitHub Settings
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
        # Replace 'your_script_name.py' with the actual name of your file (e.g., bot.py)
        run: python your_script_name.py
