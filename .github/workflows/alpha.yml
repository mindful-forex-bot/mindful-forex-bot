name: Mindful Alpha Trading Bot

on:
  schedule:
    - cron: '*/15 * * * *' # Runs every 15 minutes
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "pandas<2.0.0"
          pip install "numpy<2.0.0"
          # This installs the TA logic without the versioning errors
          pip install pandas-ta --no-dependencies
          pip install -r requirements.txt

      - name: Run Trading Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
        # IMPORTANT: Make sure this matches your file name (bot.py)
        run: python bot.py
