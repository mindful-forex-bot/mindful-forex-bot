name: MTC Logic Scanner

on:
  schedule:
    # Runs at the start of every hour (e.g., 1:00, 2:00) 
    # This aligns with the close of the 1H candle for your new strategy.
    - cron: '0 * * * *'
  workflow_dispatch: # Allows manual triggering if you want to check the market now

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy twelvedata python-telegram-bot mplfinance pandas_ta python-dotenv

      - name: Run MTC Scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
        run: python bot.py
