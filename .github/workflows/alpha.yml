name: MTC Logic Scanner

on:
  schedule:
    # Runs every 15 minutes to match your 15m candle logic
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows you to trigger it manually from the "Actions" tab

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # UPDATED: 3.12 is required for the latest pandas_ta and pandas versions
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Including all necessary libraries for the new logic
          pip install pandas numpy twelvedata python-telegram-bot mplfinance pandas_ta python-dotenv

      - name: Run MTC Scan
        env:
          # These must match your GitHub Repo > Settings > Secrets
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
        # REMINDER: Change 'your_script_name.py' to your actual filename (e.g. bot.py)
        run: python your_script_name.py
