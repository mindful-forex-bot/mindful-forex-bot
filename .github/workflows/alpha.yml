name: MTC Logic Scanner

on:
  schedule:
    # Runs at the start of every hour (UTC)
    # Note: GitHub Actions can be delayed by 5-15 mins during peak times.
    - cron: '0 * * * *'
  workflow_dispatch: # Allows you to manually trigger it from GitHub Actions tab

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Speeds up execution by caching your libraries

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy twelvedata python-telegram-bot pandas_ta python-dotenv requests

      - name: Run MTC Scan
        env:
          # These MUST be set in your GitHub Repo Settings > Secrets > Actions
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
          # Hardcoded Filter Settings
          PIP_FLOOR: 15.0
          MIN_ADX: 30.0
          MAX_CHASE_PIPS: 5.0
        run: python bot.py
